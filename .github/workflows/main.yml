name: MeD-An-Cr Oto-Analiz Motoru

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write # GitHub'ın depoya dosya yazabilmesi için gerekli kritik izin

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Depoyu Klonla
      uses: actions/checkout@v4

    - name: Python Kurulumu
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Bağımlılıkları Yükle
      run: |
        pip install requests

    - name: Analiz Motorunu Çalıştır ve Veri Üret
      env:
        CR_API_KEY: ${{ secrets.CR_API_KEY }}
      run: |
        python backend/analyzer.py

    - name: Sonuçları Depoya Kaydet ve Yayınla
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add frontend/data/
        git diff-index --quiet HEAD || (git commit -m "MeD-An-Cr: Analiz verileri güncellendi [Oto]" && git push)
        
